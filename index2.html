<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GradeBox • CBTA 19</title>
  <link rel="icon" type="image/png" href="assets/styles/img/logo.jpg">
  <style>
    /* Reset básico */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", sans-serif; }
    body, html { height: 100%; background: linear-gradient(135deg, #a8e6cf, #dcedc1); display: flex; justify-content: center; align-items: center; }

    /* Pantalla de carga */
    #loader {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: #2A9D8F;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 1000; transition: opacity 0.5s ease;
    }
    #loader img { width: 220px; margin-bottom: 30px; }

    .spinner {
      width: 50px; height: 50px;
      border: 5px solid #ffffff55; border-top: 5px solid #fff;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Contenedor principal */
    .container {
      display: flex; flex-direction: column;
      width: 450px; background: #ffffffdd; border-radius: 25px;
      overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.2);
      opacity: 0; transform: scale(0.95); visibility: hidden;
      transition: opacity 1.2s ease, transform 1.2s ease, visibility 0.3s;
      padding: 40px; align-items: center;
    }
    .container.show { opacity: 1; transform: scale(1); visibility: visible; }

    /* Logo grande */
    .logo {
      width: 220px; margin-bottom: 20px;
    }

    /* Frase inspiradora */
    .tagline {
      text-align: center; font-size: 16px; color: #264653; margin-bottom: 30px;
      font-style: italic;
    }

    /* Tabs */
    .tabs {
      display: flex; justify-content: center; gap: 10px; margin-bottom: 25px;
    }
    .tabs button {
      padding: 8px 20px; background: #eee; border: none; border-radius: 12px;
      color: #264653; font-weight: bold; cursor: pointer; transition: all 0.3s;
    }
    .tabs button.active, .tabs button:hover {
      background: linear-gradient(135deg, #2A9D8F, #52b788); color: #fff; transform: translateY(-2px);
    }

    /* Inputs flotantes con iconos */
    .input-group { position: relative; margin-bottom: 20px; width: 100%; }
    .input-group input {
      width: 100%; padding: 14px 45px 14px 15px; border: 1px solid #264653;
      border-radius: 12px; outline: none; font-size: 14px; transition: all 0.3s;
      background: #f1faee;
    }
    .input-group label {
      position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
      background: #f1faee; padding: 0 5px; color: #264653; font-size: 14px;
      pointer-events: none; transition: all 0.3s;
    }
    .input-group input:focus + label,
    .input-group input:not(:placeholder-shown) + label {
      top: -10px; left: 10px; font-size: 12px; color: #2A9D8F;
    }
    .input-group .icon {
      position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
      font-size: 18px; color: #2A9D8F; pointer-events: none;
    }
    .input-group input:focus { border-color: #2A9D8F; box-shadow: 0 0 10px rgba(42,157,143,0.2); }

    /* Botón de login */
    form button {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #52b788, #2A9D8F);
      color: white; font-weight: bold; border: none; border-radius: 12px;
      cursor: pointer; font-size: 16px; transition: all 0.3s;
    }
    form button:hover { opacity: 0.9; transform: translateY(-2px); }

    /* Mensaje de error */
    .error-message {
      color: #e63946; font-size: 14px; margin-bottom: 15px; text-align: center;
      display: none;
    }

  </style>
</head>
<body>
  <!-- Pantalla de carga -->
  <div id="loader">
    <img src="assets/styles/img/logo2.jpg" alt="Logo">
    <div class="spinner"></div>
  </div>

  <!-- Contenedor principal -->
  <div class="container">
    <img src="assets/styles/img/logo2.jpg" alt="Logo" class="logo">
    <div class="tagline">"Aprender es crecer, y crecer es nuestra misión diaria"</div>

    <div class="tabs">
      <button class="active" data-role="estudiante">Estudiante</button>
      <button data-role="personal">Personal</button>
      <button data-role="aspirante">Aspirante</button>
    </div>

    <div class="error-message" id="error">Por favor, complete todos los campos.</div>

    <form id="loginForm">
      <div class="input-group">
        <i class="icon">&#128100;</i>
        <input type="text" id="control" placeholder=" " required>
        <label for="control">Número de control</label>
      </div>

      <div class="input-group">
        <i class="icon">&#128274;</i>
        <input type="password" id="password" placeholder=" " required>
        <label for="password">Contraseña</label>
      </div>

      <button type="submit">Iniciar sesión</button>
    </form>
  </div>

  <script>
    // Ocultar loader después de 5 segundos y mostrar container
    window.addEventListener('load', () => {
      const loader = document.getElementById('loader');
      const container = document.querySelector('.container');

      setTimeout(() => {
        loader.style.opacity = '0';
        setTimeout(() => {
          loader.style.display = 'none';
          container.classList.add('show');
        }, 500); // Suaviza transición
      }, 5000); // Duración total del loader: 5 segundos
    });

    // Validación del formulario
    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('error');

    let selectedRole = 'estudiante'; // Valor inicial

    loginForm.addEventListener('submit', function(e) {
      const control = document.getElementById('control').value.trim();
      const password = document.getElementById('password').value.trim();

      if (control === '' || password === '') {
        e.preventDefault(); 
        errorMessage.style.display = 'block';
      } else {
        errorMessage.style.display = 'none';
        alert('Formulario enviado correctamente como ' + selectedRole);
      }
    });

    // Manejo de tabs
    const tabs = document.querySelectorAll('.tabs button');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        selectedRole = tab.dataset.role; // Actualiza el rol seleccionado
      });
    });
  </script>
</body>
</html>
